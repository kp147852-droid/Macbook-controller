name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  relay-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install relay deps
        run: |
          python -m pip install --upgrade pip
          pip install -r relay/requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile relay/relay_server.py

      - name: Validate key docs exist
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
