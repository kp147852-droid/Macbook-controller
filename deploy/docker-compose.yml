services:
  relay:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn relay_server:app --host 0.0.0.0 --port 8787"
    env_file:
      - ../relay/.env
    volumes:
      - ../relay:/app
    restart: unless-stopped
    networks:
      - edge

  caddy:
    image: caddy:2.10
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ../controller:/var/www/macbook-controller/controller
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - relay
    restart: unless-stopped
    networks:
      - edge

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
